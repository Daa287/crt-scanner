<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRT · TBS · Scanner v1.01</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#06060f;color:#dde1f0;font-family:monospace;padding:8px;min-height:100vh}

.header{background:#0c0c1a;border:1px solid #1c1c38;border-top:3px solid #7c3aed;padding:10px 12px;margin-bottom:8px}
.logo{font-size:17px;font-weight:bold;letter-spacing:3px;background:linear-gradient(135deg,#a78bfa,#00e676);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:1px}
.version{font-size:8px;color:#7c3aed;letter-spacing:2px;margin-bottom:6px}
.controls{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.live{display:flex;align-items:center;gap:4px;font-size:8px;color:#6b7a90}
.dot{width:6px;height:6px;border-radius:50%;background:#00e676;box-shadow:0 0 4px #00e676;animation:puls 2s infinite}
@keyframes puls{0%,100%{opacity:1}50%{opacity:.4}}
.btn{background:transparent;border:1px solid #252550;color:#6b7a90;font-family:monospace;font-size:9px;padding:4px 8px;cursor:pointer}
.btn-alarm{background:rgba(255,171,0,.08);border:1px solid rgba(255,171,0,.3);color:#ffab00;font-family:monospace;font-size:9px;padding:4px 8px;cursor:pointer}
.btn-alarm.aktiv{background:rgba(255,171,0,.2);border-color:#ffab00;box-shadow:0 0 8px rgba(255,171,0,.3)}
.badge-aktiv{font-size:8px;color:#00e676;padding:4px 8px;border:1px solid rgba(0,230,118,.3);background:rgba(0,230,118,.08)}

/* SIGNAL BAR */
.signal-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.signal-pill{padding:4px 10px;font-size:9px;font-weight:600;letter-spacing:1px;border:1px solid}
.signal-pill.long{background:rgba(0,230,118,.1);border-color:rgba(0,230,118,.4);color:#00e676}
.signal-pill.short{background:rgba(255,23,68,.1);border-color:rgba(255,23,68,.4);color:#ff1744}

/* ALARM LOG */
.alarm-log{background:#0c0c1a;border:1px solid #1c1c38;border-left:3px solid #ffab00;padding:10px 12px;margin-bottom:8px}
.alarm-log-titel{font-size:8px;letter-spacing:3px;color:#ffab00;margin-bottom:6px}
.alarm-eintrag{font-size:9px;padding:4px 0;border-bottom:1px solid #1c1c38;display:flex;gap:8px}
.alarm-eintrag:last-child{border-bottom:none}
.alarm-zeit{color:#445060;flex-shrink:0;font-size:8px}
.alarm-bull{color:#00e676}.alarm-bear{color:#ff1744}
.alarm-leer{color:#445060;font-size:9px;font-style:italic}

/* ASSET BLOCK */
.asset-block{margin-bottom:12px}
.asset-titel{font-size:10px;letter-spacing:4px;color:#dde1f0;font-weight:bold;padding:6px 0 5px;display:flex;align-items:center;gap:8px}
.asset-titel::after{content:'';flex:1;height:1px;background:#252550}
.asset-titel.gold-titel{color:#ffd700}

/* DUAL GRID */
.dual-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}

/* KARTE */
.karte{background:#0c0c1a;border:1px solid #1c1c38;transition:all .3s}
.karte.tbs-bull{border-color:rgba(0,230,118,.5);box-shadow:0 0 16px -4px rgba(0,230,118,.25)}
.karte.tbs-bear{border-color:rgba(255,23,68,.5);box-shadow:0 0 16px -4px rgba(255,23,68,.25)}
.karte.qual-hoch{border-left:3px solid #00e676}
.karte.qual-mittel{border-left:3px solid #ffab00}
.karte.qual-niedrig{border-left:3px solid #ff1744}
.karte.qual-hoch.tbs-bull{border:2px solid #00e676;border-left:3px solid #00e676;box-shadow:0 0 20px -4px rgba(0,230,118,.35)}
.karte.qual-hoch.tbs-bear{border:2px solid #ff1744;border-left:3px solid #ff1744;box-shadow:0 0 20px -4px rgba(255,23,68,.35)}
.top-balken{transition:background .3s}

/* ── KARTEN-KOPFZEILE (sauber, kein Überlappen) ── */
.karte-kopf{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;border-bottom:1px solid #1c1c38;background:#0a0a18}
.tf-pill{font-size:9px;letter-spacing:2px;padding:2px 8px;border:1px solid;font-weight:700;flex-shrink:0}
.tf-pill.h4{color:#a78bfa;border-color:rgba(167,139,250,.45);background:rgba(167,139,250,.12)}
.tf-pill.h1{color:#00e676;border-color:rgba(0,230,118,.45);background:rgba(0,230,118,.1)}
.kopf-mitte{flex:1;text-align:center}
.kopf-preis{font-size:14px;font-weight:bold;color:#dde1f0;line-height:1.2}
.kopf-veraend{font-size:9px;margin-top:1px}
.up{color:#00e676}.dn{color:#ff1744}
.qual-badge{display:inline-flex;padding:2px 7px;font-size:8px;font-weight:700;border:1px solid;letter-spacing:1px;flex-shrink:0}
.qual-badge.hoch{background:rgba(0,230,118,.12);border-color:rgba(0,230,118,.45);color:#00e676}
.qual-badge.mittel{background:rgba(255,171,0,.12);border-color:rgba(255,171,0,.45);color:#ffab00}
.qual-badge.niedrig{background:rgba(255,23,68,.12);border-color:rgba(255,23,68,.45);color:#ff1744}

/* KARTE BODY */
.karte-body{padding:8px 10px}

/* LEVELS */
.abschnitt{font-size:7px;letter-spacing:3px;color:#445060;margin-bottom:4px;padding-bottom:3px;border-bottom:1px solid #1c1c38}
.level-zeile{display:flex;justify-content:space-between;padding:1px 0}
.level-bez{font-size:8px;color:#6b7a90}
.level-val{font-size:10px;font-weight:600}
.gauge{margin:6px 0}
.gauge-track{height:6px;background:#1c1c38;border-radius:3px;position:relative}
.gauge-fill{position:absolute;inset:0;border-radius:3px}
.gauge-nadel{position:absolute;top:-3px;width:2px;height:12px;background:#fff;border-radius:2px;transform:translateX(-50%)}
.gauge-labels{display:flex;justify-content:space-between;margin-top:2px;font-size:7px;color:#445060}
.trennlinie{height:1px;background:#1c1c38;margin:7px 0}

/* TBS */
.tbs-badge{display:inline-flex;padding:3px 8px;font-size:8px;font-weight:600;margin-bottom:4px}
.tbs-text{font-size:8px;color:#6b7a90;line-height:1.4}

/* ANALYSE */
.analyse-titel{font-size:7px;letter-spacing:3px;color:#a78bfa;margin-bottom:5px}
.richtung-banner{padding:6px 8px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;border:1px solid}
.richtung-text{font-size:13px;font-weight:bold}
.levels-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px;margin-bottom:4px}
.zelle{background:#0a0a18;border:1px solid #1c1c38;padding:4px 5px}
.zelle-bez{font-size:6px;color:#445060;margin-bottom:1px}
.zelle-val{font-size:9px;font-weight:600}
.einstieg-zelle{background:#0a0a18;border:1px solid #1c1c38;padding:4px 6px;margin-bottom:4px}
.begruendung{border-left:2px solid #7c3aed;padding:5px 7px;background:rgba(124,58,237,.08);font-size:8px;color:rgba(221,225,240,.65);line-height:1.5;font-style:italic}
.abwarten{margin-top:4px;padding:4px 6px;background:rgba(255,171,0,.08);border:1px solid rgba(255,171,0,.2);font-size:8px;color:#ffab00;line-height:1.4}
.alarm-hinweis{background:rgba(255,171,0,.08);border:1px solid rgba(255,171,0,.3);padding:4px 6px;font-size:8px;color:#ffab00;margin-bottom:5px}
.gold-header{font-size:7px;letter-spacing:3px;color:#ffd700;padding:4px 0 5px;margin-bottom:4px;border-bottom:1px solid rgba(255,215,0,.15)}

/* KONFIRMATIONS-BANNER */
.konf-banner{grid-column:1/-1;padding:7px 10px;font-size:9px;letter-spacing:1px;display:flex;align-items:center;gap:6px;border:1px solid}
.konf-bull{background:rgba(0,230,118,.1);border-color:rgba(0,230,118,.4);color:#00e676}
.konf-bear{background:rgba(255,23,68,.1);border-color:rgba(255,23,68,.4);color:#ff1744}
.konf-warn{background:rgba(255,171,0,.08);border-color:rgba(255,171,0,.3);color:#ffab00}

.laden{display:flex;align-items:center;gap:5px;color:#445060;font-size:9px;padding:16px 10px}
.spinner{width:12px;height:12px;border:1.5px solid #252550;border-top-color:#a78bfa;border-radius:50%;animation:drehen .7s linear infinite;flex-shrink:0}
.fehler-text{color:#ff1744;font-size:9px;padding:10px}

.footer{text-align:center;padding:6px;font-size:7px;color:#252550;letter-spacing:2px;margin-top:4px}
@keyframes drehen{to{transform:rotate(360deg)}}
@keyframes alarmPuls{0%,100%{box-shadow:0 0 0 0 rgba(255,171,0,0)}50%{box-shadow:0 0 20px 4px rgba(255,171,0,.4)}}
.alarm-aktiv{animation:alarmPuls 1s ease-in-out 3}
</style>
</head>
<body>

<div class="header">
  <div class="logo">CRT · TBS · KI SCANNER</div>
  <div class="version">VERSION 1.01 · DUAL TIMEFRAME · H4 + H1</div>
  <div class="controls">
    <div class="live"><div class="dot"></div><span id="letzteAkt">–</span></div>
    <button class="btn" onclick="alleAkt()">↻ Aktualisieren</button>
    <button class="btn-alarm" id="alarmBtn" onclick="toggleAlarm()">🔔 Alarm: AUS</button>
    <div class="badge-aktiv">✓ H4 + H1 Aktiv</div>
  </div>
</div>

<div class="signal-bar" id="signalBar"></div>

<div class="alarm-log" id="alarmLog" style="display:none">
  <div class="alarm-log-titel">🔔 ALARM-PROTOKOLL</div>
  <div id="alarmEintraege"><div class="alarm-leer">Noch keine Alarme ausgelöst</div></div>
</div>

<div id="karten"></div>

<div class="footer">BINANCE API · v1.01 · H4 BIAS + H1 EINSTIEG · AUTO-AKT. 5 MIN · ALARM BEI TBS + QUALITÄT ≥ 7</div>

<script>
const ASSETS=[
  {sym:'BTC', name:'Bitcoin',  pair:'BTCUSDT',  gold:false},
  {sym:'ETH', name:'Ethereum', pair:'ETHUSDT',  gold:false},
  {sym:'SOL', name:'Solana',   pair:'SOLUSDT',  gold:false},
  {sym:'BNB', name:'BNB',      pair:'BNBUSDT',  gold:false},
  {sym:'PAXG',name:'PAX Gold', pair:'PAXGUSDT', gold:true },
];
const B='https://api.binance.com/api/v3';
let tmr=null,alarmAktiv=false,alarmHistory=[],letzteSignale={};

function fmt(v){
  const n=parseFloat(v);
  if(isNaN(n))return'–';
  if(n>=1000)return'$'+n.toLocaleString('de-DE',{maximumFractionDigits:0});
  if(n>=10)  return'$'+n.toLocaleString('de-DE',{maximumFractionDigits:2});
  return'$'+n.toLocaleString('de-DE',{maximumFractionDigits:4});
}

function calcCRT(k,p){
  if(!k||k.length<2)return null;
  const r=k[k.length-2],c=k[k.length-1];
  const H=parseFloat(r[2]),L=parseFloat(r[3]),M=(H+L)/2,R=H-L;
  const bH=Math.max(parseFloat(c[1]),parseFloat(c[4]));
  const bL=Math.min(parseFloat(c[1]),parseFloat(c[4]));
  const tB=bL<L,tBe=bH>H;
  const pos=R>0?Math.max(0,Math.min(100,((p-L)/R)*100)):50;
  return{CRTH:H,CRTL:L,MID:M,range:R,tbsBull:tB,tbsBear:tBe,tbs:tB||tBe,pos,bias:p>=M?'AUFWÄRTS':'ABWÄRTS',preis:p};
}

function analyse(crt,v){
  if(!crt)return null;
  const{tbsBull:tB,tbsBear:tBe,tbs,pos,bias,CRTH:H,CRTL:L,MID:M,range:R,preis:p}=crt;
  let q=5;
  if(tbs)q+=2;
  if(tB&&pos<30)q++;
  if(tBe&&pos>70)q++;
  if(Math.abs(v)>2)q++;
  q=Math.min(10,Math.max(1,q));
  let ri='NEUTRAL',mo='Kein Setup',ei='–',sl=0,t1=0,t2=0;
  let bg='Kein klares Signal – abwarten.',aw='Warte auf TBS außerhalb der CRT-Range.';
  if(tB){
    ri='LONG';mo=pos<20?'#1 Orderblock':pos<40?'#2 FVG':'#3 BOS';
    sl=+(L-R*.1).toFixed(2);t1=+M.toFixed(2);t2=+H.toFixed(2);
    ei=fmt(L)+' – '+fmt(M);
    bg='Bullish TBS – Kerzenkörper unter CRTL, Short-Falle bestätigt. Long im Discount suchen.';
    aw=pos>50?'Rücksetzer zur CRTL-Zone abwarten.':'';
  }else if(tBe){
    ri='SHORT';mo=pos>80?'#1 Orderblock':pos>60?'#2 FVG':'#3 BOS';
    sl=+(H+R*.1).toFixed(2);t1=+M.toFixed(2);t2=+L.toFixed(2);
    ei=fmt(M)+' – '+fmt(H);
    bg='Bearish TBS – Kerzenkörper über CRTH, Long-Falle bestätigt. Short im Premium suchen.';
    aw=pos<50?'Pullback zur CRTH-Zone abwarten.':'';
  }else if(bias==='AUFWÄRTS'&&pos>60){
    ri='LONG';mo='#2 FVG';q=Math.max(1,q-2);
    sl=+L.toFixed(2);t1=+H.toFixed(2);t2=+(H+R*.5).toFixed(2);
    ei=fmt(M)+' – '+fmt(p);
    bg='Oberer CRT-Bereich mit Aufwärts-Bias. Kein TBS – moderate Wahrscheinlichkeit.';
    aw='TBS-Bestätigung abwarten.';
  }else if(bias==='ABWÄRTS'&&pos<40){
    ri='SHORT';mo='#2 FVG';q=Math.max(1,q-2);
    sl=+H.toFixed(2);t1=+L.toFixed(2);t2=+(L-R*.5).toFixed(2);
    ei=fmt(p)+' – '+fmt(M);
    bg='Unterer CRT-Bereich mit Abwärts-Bias. Kein TBS – moderate Wahrscheinlichkeit.';
    aw='TBS-Bestätigung abwarten.';
  }else{
    q=3;bg='Mitte der CRT-Range – kein Signal.';
    aw='Warte auf TBS außerhalb CRTH/CRTL.';
  }
  return{qualitaet:q,richtung:ri,modell:mo,einstieg:ei,stopp:sl,ziel1:t1,ziel2:t2,begruendung:bg,abwarten:aw};
}

// ── ALARM ────────────────────────────────────────────────────────────────────
function toggleAlarm(){
  alarmAktiv=!alarmAktiv;
  const btn=document.getElementById('alarmBtn');
  const log=document.getElementById('alarmLog');
  if(alarmAktiv){
    btn.textContent='🔔 Alarm: EIN';btn.classList.add('aktiv');log.style.display='block';
    try{window._audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}
  }else{
    btn.textContent='🔔 Alarm: AUS';btn.classList.remove('aktiv');log.style.display='none';
  }
}

function spieleTon(ri){
  try{
    const ctx=window._audioCtx;if(!ctx)return;
    const freq=ri==='LONG'?[440,550,660]:[660,550,440];
    freq.forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=f;o.type='sine';
      g.gain.setValueAtTime(0.3,ctx.currentTime+i*.15);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*.15+.3);
      o.start(ctx.currentTime+i*.15);o.stop(ctx.currentTime+i*.15+.3);
    });
  }catch(e){}
}

function pruefeAlarm(asset,tf,ki,crt){
  if(!alarmAktiv||!ki||!crt||!crt.tbs||ki.qualitaet<7)return;
  const key=asset.sym+'_'+ki.richtung+'_'+tf;
  if(letzteSignale[key])return;
  letzteSignale[key]=true;
  spieleTon(ki.richtung);
  try{navigator.vibrate&&navigator.vibrate([200,100,200,100,400]);}catch(e){}
  const zeit=new Date().toLocaleTimeString('de-DE');
  alarmHistory.unshift({zeit,sym:asset.sym,tf,richtung:ki.richtung,qual:ki.qualitaet,modell:ki.modell,preis:fmt(crt.preis)});
  if(alarmHistory.length>20)alarmHistory.pop();
  aktualisiereAlarmLog();
  if(Notification&&Notification.permission==='granted'){
    new Notification('CRT·TBS – '+asset.sym+' ('+tf+')',{body:ki.richtung+' · Qualität '+ki.qualitaet+'/10 · '+ki.modell});
  }else if(Notification&&Notification.permission!=='denied'){Notification.requestPermission();}
  const el=document.getElementById('k-'+asset.sym+'-'+tf);
  if(el){const k=el.querySelector('.karte');if(k){k.classList.add('alarm-aktiv');setTimeout(()=>k.classList.remove('alarm-aktiv'),3000);}}
}

function aktualisiereAlarmLog(){
  const el=document.getElementById('alarmEintraege');if(!el)return;
  if(alarmHistory.length===0){el.innerHTML='<div class="alarm-leer">Noch keine Alarme ausgelöst</div>';return;}
  el.innerHTML=alarmHistory.map(e=>`
    <div class="alarm-eintrag">
      <span class="alarm-zeit">${e.zeit}</span>
      <span class="${e.richtung==='LONG'?'alarm-bull':'alarm-bear'}">
        ${e.richtung==='LONG'?'↑':'↓'} <strong>${e.sym}</strong> (${e.tf}) ${e.richtung} · ${e.modell} · ${e.qual}/10★ · ${e.preis}
      </span>
    </div>`).join('');
}

// ── KARTE HTML ────────────────────────────────────────────────────────────────
function karteHtml(asset,tf,tfLabel,s){
  const tfCls=tf==='4h'?'h4':'h1';

  // LADE-ZUSTAND
  if(s.laden)return`
    <div id="k-${asset.sym}-${tf}">
      <div class="karte">
        <div class="top-balken" style="height:3px;background:#252550"></div>
        <div class="karte-kopf">
          <div class="tf-pill ${tfCls}">${tfLabel}</div>
          <div class="laden"><div class="spinner"></div>Lade...</div>
          <div></div>
        </div>
      </div>
    </div>`;

  // FEHLER-ZUSTAND
  if(s.fehler)return`
    <div id="k-${asset.sym}-${tf}">
      <div class="karte">
        <div class="top-balken" style="height:3px;background:#ff1744"></div>
        <div class="karte-kopf">
          <div class="tf-pill ${tfCls}">${tfLabel}</div>
          <div class="fehler-text">${s.fehler}</div>
          <div></div>
        </div>
      </div>
    </div>`;

  const{crt:c,preis:p,veraend:v,analyse:ki}=s;
  const qKls=ki.qualitaet>=7?'qual-hoch':ki.qualitaet>=5?'qual-mittel':'qual-niedrig';
  const qBKls=ki.qualitaet>=7?'hoch':ki.qualitaet>=5?'mittel':'niedrig';
  const qStern=ki.qualitaet>=7?'⭐⭐⭐':ki.qualitaet>=5?'⭐⭐':'⭐';
  const tCls=c.tbs?(c.tbsBull?'tbs-bull':'tbs-bear'):'';
  const balH=ki.qualitaet>=7?'5px':'3px';
  const balC=ki.qualitaet>=7&&c.tbs?(c.tbsBull?'#00e676':'#ff1744'):(c.tbs?(c.tbsBull?'#00e676':'#ffab00'):(c.bias==='AUFWÄRTS'?'#00e676':'#ff1744'));
  const fill=c.bias==='AUFWÄRTS'?'linear-gradient(90deg,rgba(0,230,118,.2),rgba(0,230,118,.6))':'linear-gradient(90deg,rgba(255,23,68,.2),rgba(255,23,68,.6))';
  const tbsBg=c.tbsBull?'rgba(0,230,118,.12)':c.tbsBear?'rgba(255,23,68,.12)':'rgba(255,255,255,.04)';
  const tbsBo=c.tbsBull?'rgba(0,230,118,.4)':c.tbsBear?'rgba(255,23,68,.4)':'#252550';
  const tbsCo=c.tbsBull?'#00e676':c.tbsBear?'#ff1744':'#6b7a90';
  const tbsTx=c.tbsBull?'⚡ BULLISH TBS':c.tbsBear?'⚡ BEARISH TBS':'⏳ KEIN TBS';
  const tbsDe=c.tbsBull?'Körper < CRTL '+fmt(c.CRTL)+' → Long suchen':c.tbsBear?'Körper > CRTH '+fmt(c.CRTH)+' → Short suchen':'Warte auf Körper-Close außerhalb CRT';
  const rF=ki.richtung==='LONG'?'#00e676':ki.richtung==='SHORT'?'#ff1744':'#ffab00';
  const rBg=ki.richtung==='LONG'?'rgba(0,230,118,.1)':ki.richtung==='SHORT'?'rgba(255,23,68,.1)':'rgba(255,171,0,.1)';
  const rBo=ki.richtung==='LONG'?'rgba(0,230,118,.4)':ki.richtung==='SHORT'?'rgba(255,23,68,.4)':'rgba(255,171,0,.4)';
  const rTx=ki.richtung==='LONG'?'↑ LONG':ki.richtung==='SHORT'?'↓ SHORT':'→ NEUT';
  const qF=ki.qualitaet>=7?'#00e676':ki.qualitaet>=5?'#ffab00':'#ff1744';
  const awH=ki.abwarten?'<div class="abwarten">⏳ '+ki.abwarten+'</div>':'';
  const alH=ki.qualitaet>=7&&c.tbs?'<div class="alarm-hinweis">🔔 HOHE QUALITÄT – ALARM</div>':'';
  const goldH=asset.gold?'<div class="gold-header">🥇 PAXG · 1 FEINUNZE GOLD</div>':'';
  const vCls=v>=0?'up':'dn';
  const vTxt=(v>=0?'▲':'▼')+Math.abs(v).toFixed(2)+'%';

  return`
  <div id="k-${asset.sym}-${tf}">
    <div class="karte ${tCls} ${qKls}">
      <div class="top-balken" style="height:${balH};background:${balC}"></div>

      <!-- KOPFZEILE: TF-Label | Preis + % | Qualität -->
      <div class="karte-kopf">
        <div class="tf-pill ${tfCls}">${tfLabel}</div>
        <div style="text-align:center;flex:1;padding:0 6px">
          <div style="font-size:15px;font-weight:bold;color:#dde1f0;line-height:1.2">${fmt(p)}</div>
          <div style="font-size:9px;margin-top:1px" class="${vCls}">${vTxt}</div>
        </div>
        <div class="qual-badge ${qBKls}">${qStern}<br>${ki.qualitaet}/10</div>
      </div>

      <!-- BODY -->
      <div class="karte-body">
        ${goldH}
        ${alH}
        <div class="abschnitt">CRT LEVELS</div>
        <div class="level-zeile"><span class="level-bez">CRTH</span><span class="level-val" style="color:#ff1744">${fmt(c.CRTH)}</span></div>
        <div class="level-zeile"><span class="level-bez">MID</span><span class="level-val" style="color:#ffab00">${fmt(c.MID)}</span></div>
        <div class="level-zeile"><span class="level-bez">CRTL</span><span class="level-val" style="color:#00e676">${fmt(c.CRTL)}</span></div>
        <div class="gauge">
          <div class="gauge-track">
            <div class="gauge-fill" style="width:${c.pos}%;background:${fill}"></div>
            <div class="gauge-nadel" style="left:${c.pos}%"></div>
          </div>
          <div class="gauge-labels">
            <span>↓</span><span>${c.pos.toFixed(0)}% ${c.bias==='AUFWÄRTS'?'↑':'↓'}</span><span>↑</span>
          </div>
        </div>

        <div class="trennlinie"></div>
        <div class="tbs-badge" style="background:${tbsBg};border:1px solid ${tbsBo};color:${tbsCo}">${tbsTx}</div>
        <div class="tbs-text">${tbsDe}</div>

        <div class="trennlinie"></div>
        <div class="analyse-titel">📊 ANALYSE</div>
        <div class="richtung-banner" style="background:${rBg};border-color:${rBo}">
          <span style="font-size:13px;font-weight:bold;color:${rF}">${rTx}</span>
          <span style="font-size:8px;color:#6b7a90">${ki.modell}</span>
        </div>
        <div class="levels-grid">
          <div class="zelle"><div class="zelle-bez">Stop</div><div class="zelle-val" style="color:#ff1744">${fmt(ki.stopp)}</div></div>
          <div class="zelle"><div class="zelle-bez">Ziel 1</div><div class="zelle-val" style="color:#00e676">${fmt(ki.ziel1)}</div></div>
          <div class="zelle"><div class="zelle-bez">Ziel 2</div><div class="zelle-val" style="color:#00e676">${fmt(ki.ziel2)}</div></div>
        </div>
        <div class="einstieg-zelle"><div class="zelle-bez">EINSTIEG</div><div class="zelle-val" style="color:#dde1f0;font-size:8px">${ki.einstieg}</div></div>
        <div class="begruendung">${ki.begruendung}</div>
        ${awH}
      </div>
    </div>
  </div>`;
}

function konfBanner(ri4,ri1){
  if(ri4==='NEUTRAL'&&ri1==='NEUTRAL')return'';
  if(ri4===ri1&&ri4!=='NEUTRAL'){
    const cls=ri4==='LONG'?'konf-bull':'konf-bear';
    return`<div class="konf-banner ${cls}">✅ H4 + H1 BESTÄTIGUNG: ${ri4==='LONG'?'↑ LONG':'↓ SHORT'} – HOHES VERTRAUEN</div>`;
  }
  if(ri4!=='NEUTRAL'&&ri1!=='NEUTRAL'&&ri4!==ri1){
    return`<div class="konf-banner konf-warn">⚠️ H4: ${ri4} · H1: ${ri1} – WIDERSPRUCH · ABWARTEN</div>`;
  }
  return'';
}

async function ladeAsset(asset){
  const container=document.getElementById('asset-'+asset.sym);
  if(!container)return{sym:asset.sym,signale:[]};

  const ergebnisse=await Promise.all([
    {wert:'4h',label:'H4'},
    {wert:'1h',label:'H1'}
  ].map(async tf=>{
    try{
      const[kr,tr]=await Promise.all([
        fetch(B+'/klines?symbol='+asset.pair+'&interval='+tf.wert+'&limit=3'),
        fetch(B+'/ticker/24hr?symbol='+asset.pair)
      ]);
      if(!kr.ok||!tr.ok)throw new Error('Fehler '+(!kr.ok?kr.status:tr.status));
      const[klines,ticker]=await Promise.all([kr.json(),tr.json()]);
      const preis=parseFloat(ticker.lastPrice);
      const veraend=parseFloat(ticker.priceChangePercent);
      const crt=calcCRT(klines,preis);
      const an=analyse(crt,veraend);
      pruefeAlarm(asset,tf.wert,an,crt);
      return{tf:tf.wert,label:tf.label,ok:true,crt,preis,veraend,analyse:an};
    }catch(e){
      return{tf:tf.wert,label:tf.label,ok:false,fehler:e.message};
    }
  }));

  const[r4,r1]=ergebnisse;
  const ri4=r4.ok?r4.analyse.richtung:'NEUTRAL';
  const ri1=r1.ok?r1.analyse.richtung:'NEUTRAL';

  container.innerHTML=`
    <div class="dual-grid">
      ${konfBanner(ri4,ri1)}
      ${karteHtml(asset,'4h','H4',r4.ok?{laden:false,crt:r4.crt,preis:r4.preis,veraend:r4.veraend,analyse:r4.analyse}:{laden:false,fehler:r4.fehler})}
      ${karteHtml(asset,'1h','H1',r1.ok?{laden:false,crt:r1.crt,preis:r1.preis,veraend:r1.veraend,analyse:r1.analyse}:{laden:false,fehler:r1.fehler})}
    </div>`;

  const signale=[];
  ergebnisse.forEach(r=>{
    if(r.ok&&r.analyse.richtung!=='NEUTRAL'&&r.analyse.qualitaet>=5){
      signale.push({sym:asset.sym,tf:r.label,richtung:r.analyse.richtung,qual:r.analyse.qualitaet,tbs:r.crt.tbs});
    }
  });
  return{sym:asset.sym,signale};
}

async function alleAkt(){
  document.getElementById('letzteAkt').textContent=new Date().toLocaleTimeString('de-DE');

  ASSETS.forEach(asset=>{
    const c=document.getElementById('asset-'+asset.sym);
    if(c){
      c.innerHTML=`<div class="dual-grid">
        ${karteHtml(asset,'4h','H4',{laden:true})}
        ${karteHtml(asset,'1h','H1',{laden:true})}
      </div>`;
    }
  });

  const alle=await Promise.all(ASSETS.map(a=>ladeAsset(a)));
  const alleSignale=alle.flatMap(e=>e.signale);
  const bar=document.getElementById('signalBar');
  if(bar){
    bar.innerHTML=alleSignale.length>0
      ?alleSignale.map(s=>`<div class="signal-pill ${s.richtung==='LONG'?'long':'short'}">${s.richtung==='LONG'?'↑':'↓'} ${s.sym} ${s.tf} · ${s.qual}★ ${s.tbs?'⚡':''}</div>`).join('')
      :'';
  }
}

// INIT
document.getElementById('karten').innerHTML=ASSETS.map(a=>`
  <div class="asset-block">
    <div class="asset-titel ${a.gold?'gold-titel':''}">${a.gold?'🥇':''} ${a.sym} · ${a.name}</div>
    <div id="asset-${a.sym}"></div>
  </div>`).join('');

if(tmr)clearInterval(tmr);
tmr=setInterval(alleAkt,300000);
alleAkt();
</script>
</body>
